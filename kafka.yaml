# 04-kafka.yaml
apiVersion: platform.confluent.io/v1beta1
kind: Kafka
metadata:
  name: kafka
  namespace: confluent
spec:
  replicas: 2

  image:
    application: confluentinc/cp-server:7.6.0
    init: confluentinc/confluent-init-container:2.8.0

  # Reference the KRaftController for metadata quorum
  dependencies:
    kRaftController:
      controllerListener:
        tls:
          enabled: false
      bootstrapEndpoint: kraft-controller.confluent.svc.cluster.local:9093

  dataVolumeCapacity: 50Gi

  storageClass:
    name: gp3

  podTemplate:
    resources:
      requests:
        cpu: "1"
        memory: 4Gi
      limits:
        cpu: "2"
        memory: 8Gi

    # Pin brokers to broker node group
    # nodeSelector:
    #   role: kafka-broker

    # tolerations:
    #   - key: dedicated
    #     operator: Equal
    #     value: kafka-broker
    #     effect: NoSchedule

    # Spread brokers across AZs — one per zone
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                platform.confluent.io/type: kafka
            topologyKey: topology.kubernetes.io/zone

  configOverrides:
    server:
      - min.insync.replicas=1        # RF=2 cluster; ISR=1 allows 1 broker down
      - default.replication.factor=2
      - offsets.topic.replication.factor=2
      - transaction.state.log.replication.factor=2
      - log.retention.hours=168