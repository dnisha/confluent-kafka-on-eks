# 03-kraft-controller.yaml
apiVersion: platform.confluent.io/v1beta1
kind: KRaftController
metadata:
  name: kraft-controller
  namespace: confluent
spec:
  replicas: 1

  image:
    application: confluentinc/cp-server:7.6.0
    init: confluentinc/confluent-init-container:2.8.0

  dataVolumeCapacity: 10Gi

  storageClass:
    name: gp3

  podTemplate:
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "1"
        memory: 4Gi

    # Pin controller to its dedicated node group
    nodeSelector:
      role: kafka-controller

    tolerations:
      - key: dedicated
        operator: Equal
        value: kafka-controller
        effect: NoSchedule

    # One controller pod per node
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                platform.confluent.io/type: kraftcontroller
            topologyKey: kubernetes.io/hostname